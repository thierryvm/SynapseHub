name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend — install / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  rust:
    name: Rust — fmt / check / clippy / test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-features

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        working-directory: src-tauri
        # `--ignore` is passed inline because cargo-audit's auto-discovery of
        # `audit.toml` is unreliable under GitHub Actions working-directory
        # changes (the file is read on local invocation but skipped here).
        # `src-tauri/audit.toml` remains the documented source of truth for
        # ignored advisories — keep both in sync. Tracking removal: #13.
        run: cargo audit --ignore RUSTSEC-2026-0097
