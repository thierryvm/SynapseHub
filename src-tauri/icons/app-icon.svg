<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0F1120"/>
      <stop offset="100%" stop-color="#0B0D18"/>
    </linearGradient>

    <!-- Main synapse gradient: indigo → cyan -->
    <linearGradient id="synapse-grad" x1="180" y1="180" x2="844" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818CF8"/>
      <stop offset="50%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>

    <!-- Glow for center node -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer node glow -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00D1FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D1FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6366F1" flood-opacity="0.25"/>
    </filter>

    <!-- Line glow filter -->
    <filter id="line-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background rounded rect ───────────────────────────────────────────── -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg-grad)"/>

  <!-- Subtle inner border -->
  <rect width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="white" stroke-width="2" stroke-opacity="0.06"/>

  <!-- ── Ambient glow behind center ────────────────────────────────────────── -->
  <circle cx="512" cy="512" r="340" fill="url(#center-glow)"/>

  <!-- ── Connection lines (drawn before nodes so nodes sit on top) ─────────── -->
  <!-- Top-left -->
  <line x1="512" y1="512" x2="234" y2="268"
        stroke="url(#synapse-grad)" stroke-width="22" stroke-linecap="round"
        opacity="0.45" filter="url(#line-glow)"/>
  <!-- Top-right -->
  <line x1="512" y1="512" x2="790" y2="268"
        stroke="url(#synapse-grad)" stroke-width="22" stroke-linecap="round"
        opacity="0.45" filter="url(#line-glow)"/>
  <!-- Bottom-left -->
  <line x1="512" y1="512" x2="234" y2="756"
        stroke="url(#synapse-grad)" stroke-width="22" stroke-linecap="round"
        opacity="0.45" filter="url(#line-glow)"/>
  <!-- Bottom-right -->
  <line x1="512" y1="512" x2="790" y2="756"
        stroke="url(#synapse-grad)" stroke-width="22" stroke-linecap="round"
        opacity="0.45" filter="url(#line-glow)"/>

  <!-- ── Outer node glows ───────────────────────────────────────────────────── -->
  <circle cx="234" cy="268" r="80" fill="url(#node-glow)"/>
  <circle cx="790" cy="268" r="80" fill="url(#node-glow)"/>
  <circle cx="234" cy="756" r="80" fill="url(#node-glow)"/>
  <circle cx="790" cy="756" r="80" fill="url(#node-glow)"/>

  <!-- ── Outer nodes ────────────────────────────────────────────────────────── -->
  <!-- Top-left node -->
  <circle cx="234" cy="268" r="52"
          fill="#1A1D3A" stroke="url(#synapse-grad)" stroke-width="6"/>
  <circle cx="234" cy="268" r="24" fill="#00D1FF" opacity="0.85"/>

  <!-- Top-right node -->
  <circle cx="790" cy="268" r="52"
          fill="#1A1D3A" stroke="url(#synapse-grad)" stroke-width="6"/>
  <circle cx="790" cy="268" r="24" fill="#818CF8" opacity="0.85"/>

  <!-- Bottom-left node -->
  <circle cx="234" cy="756" r="52"
          fill="#1A1D3A" stroke="url(#synapse-grad)" stroke-width="6"/>
  <circle cx="234" cy="756" r="24" fill="#818CF8" opacity="0.85"/>

  <!-- Bottom-right node -->
  <circle cx="790" cy="756" r="52"
          fill="#1A1D3A" stroke="url(#synapse-grad)" stroke-width="6"/>
  <circle cx="790" cy="756" r="24" fill="#00D1FF" opacity="0.85"/>

  <!-- ── Center node (main hub) ─────────────────────────────────────────────── -->
  <circle cx="512" cy="512" r="130"
          fill="#14163A" stroke="url(#synapse-grad)" stroke-width="8"
          filter="url(#shadow)"/>
  <!-- Inner fill -->
  <circle cx="512" cy="512" r="108" fill="url(#synapse-grad)" opacity="0.15"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="56" fill="url(#synapse-grad)"/>
  <!-- Specular highlight -->
  <circle cx="490" cy="490" r="18" fill="white" opacity="0.18"/>
</svg>
