<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Monochrome tray icon — white on transparent.
    Use this variant for macOS Template Image support (auto light/dark mode).
    Rename to tray-Template.png after conversion on macOS.
  -->

  <!-- Connection lines -->
  <line x1="16" y1="16" x2="5"  y2="6"  stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="16" x2="27" y2="6"  stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="16" x2="5"  y2="26" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="16" x2="27" y2="26" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Outer nodes -->
  <circle cx="5"  cy="6"  r="2.8" fill="white"/>
  <circle cx="27" cy="6"  r="2.8" fill="white"/>
  <circle cx="5"  cy="26" r="2.8" fill="white"/>
  <circle cx="27" cy="26" r="2.8" fill="white"/>

  <!-- Center node -->
  <circle cx="16" cy="16" r="5.5" fill="white"/>
</svg>
